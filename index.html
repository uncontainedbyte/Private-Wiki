
<!DOCTYPE html>
<html>
	<title>Wiki</title>
	<link rel="stylesheet" href="main.css">
	<script type="module" src="main.js" defer></script>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
	<div id="page-id" hidden>-1</div>
	<h1 id="title">Home</h1>
	<div id="header">
		<div class="bar-paging">
			<div class="bar">
				<a href="?page=0">Home</a>
				<a href="javascript:history.back()">Back</a>
				<span id="edit-sign" style="color:red;"hidden>Editing</span>
			</div>
			<input class = "bar search" id="search-box" type="search" placeholder="Search" disabled="">
		</div>
		<div class="bar-btns">
			<div class="bar-stack">
				<button class = "bar" id="edit-lock-btn">Edit</button>
				<button class = "bar" id="save-btn">Save</button>
			</div>
			<div class="bar-stack">
				<button class = "bar" id="create-page-btn">Create</button>
				<button class = "bar" id="delete-page-btn">Delete</button>
			</div>
			<div class="bar-stack">
				<button class = "bar" id="backup-export-btn">Backup</button>
				<button class = "bar" id="backup-import-btn">Restore</button>
			</div>
		</div>
		<input type="file" id="fileInput" accept=".json" hidden>
	</div>
	<br><div id="content" contenteditable="true"></div>
	<div id="menu" style="display: none; top: 288px; left: 48px;">
		<div id="menu-text-formatting" class="menu-entry">
			<button class="B-Btn menu-entry-dot"><strong>B</strong></button>
			<button class="I-Btn menu-entry-dot"><em>I</em></button>
			<button class="U-Btn menu-entry-dot"><u>U</u></button>
			<button class="S-Btn menu-entry-dot"><del>S</del></button>
		</div>
		<div id="menu-headings" class="menu-entry">
			<button class="H1-Btn menu-entry-dot">h1</button>
			<button class="H2-Btn menu-entry-dot">h2</button>
			<button class="H3-Btn menu-entry-dot">h3</button>
			<button class="H4-Btn menu-entry-dot">h4</button>
			<button class="H5-Btn menu-entry-dot">h5</button>
			<button class="H6-Btn menu-entry-dot">h6</button>
		</div>
		<div id="menu-XCV" class="menu-entry">
			<button class="copy-btn menu-entry-dot">copy</button>
			<button class="paste-btn menu-entry-dot">paste</button>
			<button class="cut-btn menu-entry-dot">cut</button>
		</div>
		<div id="menu-undo-redo" class="menu-entry">
			<button class="undo-btn menu-entry-dot">undo</button>
			<button class="redo-btn menu-entry-dot">redo</button>
		</div>
		<div id="menu-divider-table" class="menu-entry">
			<button class="divider-btn menu-entry-dot">divider</button>
			<button class="table-btn menu-entry-dot">table</button>
		</div>
		<div id="menu-link" class="menu-entry">
			<button class="link-btn menu-entry-dot">link</button>
		</div>
		<div id="menu-image" class="menu-entry">
			<button class="image-btn menu-entry-dot">image</button>
		</div>
		<div id="menu-newline" class="menu-entry">
			<button class="newline-btn menu-entry-dot">newline</button>
		</div>
		<div id="menu-row-col" class="menu-entry">
			<button class="rowA-btn menu-entry-dot">rw+</button>
			<button class="rowS-btn menu-entry-dot">rw-</button>
			<button class="colA-btn menu-entry-dot">cl+</button>
			<button class="colS-btn menu-entry-dot">cl-</button>
		</div>
		<div id="menu-delete" class="menu-entry">
			<button class="delete-btn menu-entry-dot">delete</button>
		</div>
		<div id="menu-clear" class="menu-entry">
			<button class="clear-btn menu-entry-dot">clear</button>
		</div>
	</div>
	<div id="overlay" hidden="">
		<div id="popup">
			<label for="popupInput">Enter Page Title:</label><br>
			<input id="popupInput" type="text">
			<div id="dropZone" contentEditable="true" data-placeholder="Drop an image here, paste one, paste link or click to select."></div>
			<input id="popupFile" type="file" accept="image/*" hidden>
			<button id="popup-okBtn">OK</button>
			<button id="popup-cancelBtn">Cancel</button>
		</div>
	</div>
</body></html>
